<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MAPPING ECONOMIC NETWORK UNIT - SBR 6171</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
}

.panel{
position:absolute;
top:10px;
left:10px;
z-index:1000;
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
width:280px;
max-height:90vh;
overflow:auto;
}

input,select{
width:100%;
margin-top:5px;
margin-bottom:10px;
padding:5px;
}

button{
width:100%;
padding:6px;
}

.stat{
font-size:13px;
margin-top:10px;
}

.marker-cluster-custom{
background:rgba(0,120,255,0.6);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
width:40px;
height:40px;
}

</style>
</head>

<body>

<div class="panel">

<b>MENU SBR</b><br>
Kota Pontianak

<input type="text" id="searchBox" placeholder="Cari nama usaha">

<select id="filterKec">
<option value="">Semua Kecamatan</option>
</select>

<button onclick="toggleHeatmap()">Toggle Heatmap</button>

<div class="stat">
<b>Statistik Kecamatan</b>
<div id="statistik"></div>
</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>

var map = L.map('map').setView([-0.02,109.34],12)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

var markers = L.markerClusterGroup({

chunkedLoading:true,

iconCreateFunction:function(cluster){

var count = cluster.getChildCount()

return L.divIcon({
html:"<div>"+count+"</div>",
className:"marker-cluster-custom",
iconSize:L.point(40,40)
})

}

})

map.addLayer(markers)

var heatLayer
var heatData=[]
var usahaData=[]

var sheetURL="https://docs.google.com/spreadsheets/d/e/19y-xm4PEtlDlDjCRlsC3Jd9u5LIT22Dga5Nynf-rb78/pub?output=csv"


function getColor(skala){

if(!skala) return "blue"

skala=skala.toLowerCase()

if(skala.includes("mikro")) return "green"
if(skala.includes("kecil")) return "orange"
if(skala.includes("menengah")) return "red"
if(skala.includes("besar")) return "purple"

return "blue"

}

function createMarker(u){

var icon=L.divIcon({
html:"📍",
className:""
})

var marker=L.marker([u.lat,u.lon])

var popup=`
<b>${u.nama}</b><br>
Jenis: ${u.kegiatan}<br>
Skala: ${u.skala}<br>
Alamat: ${u.alamat}<br>
Kelurahan: ${u.desa}<br>
Kecamatan: ${u.kecamatan}
`

marker.bindPopup(popup)

return marker

}

function loadData(data){

markers.clearLayers()
heatData=[]

data.forEach(function(u){

if(!u.lat || !u.lon) return

var marker=createMarker(u)

markers.addLayer(marker)

heatData.push([u.lat,u.lon,0.5])

})

heatLayer=L.heatLayer(heatData,{radius:25})

updateStat(data)

}

function updateStat(data){

var kecCount={}

data.forEach(function(u){

if(!kecCount[u.kecamatan])
kecCount[u.kecamatan]=0

kecCount[u.kecamatan]++

})

var html=""

for(var k in kecCount){

html+=k+" : "+kecCount[k]+" usaha<br>"

}

document.getElementById("statistik").innerHTML=html

}

function populateKecamatan(data){

var kecSet=new Set()

data.forEach(function(d){

if(d.kecamatan)
kecSet.add(d.kecamatan)

})

var select=document.getElementById("filterKec")

select.innerHTML='<option value="">Semua Kecamatan</option>'

kecSet.forEach(function(k){

var opt=document.createElement("option")
opt.value=k
opt.text=k

select.appendChild(opt)

})

}

function filterData(){

var kec=document.getElementById("filterKec").value
var search=document.getElementById("searchBox").value.toLowerCase()

var filtered=usahaData.filter(function(u){

var cocok=true

if(kec && u.kecamatan!=kec)
cocok=false

if(search && !u.nama.toLowerCase().includes(search))
cocok=false

return cocok

})

loadData(filtered)

}

document.getElementById("filterKec")
.addEventListener("change",filterData)

document.getElementById("searchBox")
.addEventListener("keyup",filterData)

function toggleHeatmap(){

if(map.hasLayer(heatLayer))
map.removeLayer(heatLayer)
else
map.addLayer(heatLayer)

}

function loadSheet(){

Papa.parse(sheetURL,{

download:true,
header:true,
dynamicTyping:true,

complete:function(results){

var data=results.data

usahaData=data.map(function(r){

return{

nama:r.nama_usaha,
alamat:r.alamat_usaha,
kegiatan:r.kegiatan_usaha,
skala:r.skala_usaha,
kecamatan:r.nmkec,
desa:r.nmdesa,
lat:parseFloat(r.latitude),
lon:parseFloat(r.longitude)

}

})

populateKecamatan(usahaData)
loadData(usahaData)

}

})

}

loadSheet()

setInterval(loadSheet,30000)

</script>

</body>
</html>
