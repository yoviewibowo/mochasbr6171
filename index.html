<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mapping Observasi Cakupan Hasil Usaha SBR BPS Kota Pontianak</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>

<style>

body{margin:0;font-family:Arial;}
#map{height:100vh;}

/* PANEL */
.panel{
position:absolute;top:10px;left:10px;z-index:1000;
background:white;padding:15px;border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
width:280px;max-height:90vh;overflow:auto;
}

input,select{width:100%;margin:5px 0 10px;padding:5px;}
button{width:100%;padding:6px;}
.stat{font-size:13px;margin-top:10px;}

/* CLUSTER */
.marker-cluster-custom{
background:rgba(0,120,255,0.6);
border-radius:50%;
display:flex;align-items:center;justify-content:center;
color:white;font-weight:bold;width:40px;height:40px;
}

/* 🌸 LOADING MOCHA PASTEL 🌸 */
#loading{
position:fixed;top:0;left:0;width:100%;height:100%;
background:linear-gradient(135deg,#EFD6BF,#C87A32);
z-index:2000;display:flex;flex-direction:column;
align-items:center;justify-content:center;
color:#6d4c41;
}

.coffee-img{
width:120px;
animation:float 2.5s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-12px)}
}

#loading-text{
margin-top:10px;
font-size:16px;
text-align:center;
}

.progress-container{
width:260px;height:10px;
background:#e0cfc2;border-radius:6px;
overflow:hidden;margin-top:15px;
}

#progress-bar{
width:0%;height:100%;
background:#5E3917;
transition:width 0.3s;
}

#progress-text{
margin-top:8px;
font-size:14px;
}

</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <img class="coffee-img"
  src="https://raw.githubusercontent.com/yoviewibowo/mochasbr6171/main/iconmochasbr6171.png">
  
  <div id="loading-text">
    MOCHA sedang menyeduh data usaha...
  </div>

  <div class="progress-container">
    <div id="progress-bar"></div>
  </div>

  <div id="progress-text">0%</div>
</div>

<div class="panel">
<b>MOCHA SBR</b><br>Kota Pontianak

<input type="text" id="searchBox"
placeholder="Cari nama usaha / username profiler">

<select id="filterKec">
<option value="">Semua Kecamatan</option>
</select>

<button onclick="toggleHeatmap()">Toggle Heatmap</button>

<div class="stat">
<b>Statistik Kecamatan</b>
<div id="statistik"></div>
</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>

var map=L.map('map').setView([-0.02,109.34],12)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

var markers=L.markerClusterGroup({
chunkedLoading:true,
iconCreateFunction:function(cluster){
return L.divIcon({
html:"<div>"+cluster.getChildCount()+"</div>",
className:"marker-cluster-custom",
iconSize:L.point(40,40)
})
}
})

map.addLayer(markers)

var heatLayer
var heatData=[]
var usahaData=[]

var sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTtxjPWA_jckzAWIbQUs0s2dKWE76oenRiukwAlRpNIAn0YaBLCN68-Kt1oHEVLeEu8HKw8hDy0dapw/pub?output=csv"

/* PROGRESS */
function updateProgress(val){
document.getElementById("progress-bar").style.width=val+"%"
document.getElementById("progress-text").innerText=Math.floor(val)+"%"
}

function hideLoading(){
updateProgress(100)
setTimeout(()=>document.getElementById("loading").style.display="none",500)
}

function createMarker(u){

var marker=L.marker([u.lat,u.lon])

var popup=`
<b>${u.nama||'-'}</b><br>
ID SBR: <b>${u.idsbr||'-'}</b><br>
Profiler: <b>${u.profiler||'-'}</b><br>
Jenis: ${u.kegiatan||'-'}<br>
Skala: ${u.skala||'-'}<br>
Alamat: ${u.alamat||'-'}<br>
Kelurahan: ${u.desa||'-'}<br>
Kecamatan: ${u.kecamatan||'-'}
`

marker.bindPopup(popup)
return marker
}

/* 🔥 PROGRESSIVE MARKER */
function loadData(data){

markers.clearLayers()
heatData=[]

let i=0
let batchSize=200

function addBatch(){

let count=0

while(i<data.length && count<batchSize){

let u=data[i]

if(!isNaN(u.lat)&&!isNaN(u.lon)){
let marker=createMarker(u)
markers.addLayer(marker)
heatData.push([u.lat,u.lon,0.5])
}

i++
count++

}

// update progress real
updateProgress((i/data.length)*100)

if(i<data.length){
requestAnimationFrame(addBatch)
}else{

heatLayer=L.heatLayer(heatData,{radius:25})
updateStat(data)

if(markers.getLayers().length>0){
map.fitBounds(markers.getBounds())
}

hideLoading()

}

}

addBatch()

}

function updateStat(data){

var kecCount={}
var total=data.length

data.forEach(function(u){
if(!kecCount[u.kecamatan])kecCount[u.kecamatan]=0
kecCount[u.kecamatan]++
})

var html="<b>Total Usaha : "+total+"</b><br><br>"
for(var k in kecCount){
html+=k+" : "+kecCount[k]+" usaha<br>"
}

document.getElementById("statistik").innerHTML=html
}

function populateKecamatan(data){

var kecSet=new Set()

data.forEach(d=>{if(d.kecamatan)kecSet.add(d.kecamatan)})

var select=document.getElementById("filterKec")
select.innerHTML='<option value="">Semua Kecamatan</option>'

kecSet.forEach(function(k){
var opt=document.createElement("option")
opt.value=k
opt.text=k
select.appendChild(opt)
})

}

function filterData(){

var kec=document.getElementById("filterKec").value
var search=document.getElementById("searchBox").value.toLowerCase()

var filtered=usahaData.filter(function(u){

var cocok=true

if(kec && u.kecamatan!=kec) cocok=false

var nama=(u.nama||"").toLowerCase()
var profiler=(u.profiler||"").toLowerCase()

if(search && !(nama.includes(search)||profiler.includes(search)))
cocok=false

return cocok

})

loadData(filtered)

}

document.getElementById("filterKec")
.addEventListener("change",filterData)

document.getElementById("searchBox")
.addEventListener("keyup",filterData)

function toggleHeatmap(){
if(!heatLayer) return
if(map.hasLayer(heatLayer)) map.removeLayer(heatLayer)
else map.addLayer(heatLayer)
}

function loadSheet(){

Papa.parse(sheetURL,{
download:true,
header:true,
dynamicTyping:true,

complete:function(results){

var data=results.data

usahaData=data.map(function(r){
return{
nama:r.nama_usaha,
idsbr:r.idsbr,
alamat:r.alamat_usaha,
kegiatan:r.kegiatan_usaha,
skala:r.skala_usaha,
kecamatan:r.nmkec,
desa:r.nmdesa,
profiler:r.gc_username,
lat:parseFloat(r.latitude),
lon:parseFloat(r.longitude)
}
})

populateKecamatan(usahaData)
loadData(usahaData)

}

})

}

loadSheet()

</script>

</body>
</html>
