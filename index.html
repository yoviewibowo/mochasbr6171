<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Peta Sebaran Usaha Pontianak</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
}

.panel{
position:absolute;
top:10px;
left:10px;
z-index:1000;
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
width:260px;
}

input,select{
width:100%;
margin-top:5px;
margin-bottom:10px;
padding:5px;
}

button{
width:100%;
padding:6px;
}

.marker-cluster-small {
background: rgba(0,150,255,0.4);
}

.marker-cluster-small div {
background: rgba(0,150,255,0.6);
width: 30px;
height: 30px;
border-radius: 50%;
}

.marker-cluster-medium {
background: rgba(255,165,0,0.4);
}

.marker-cluster-medium div {
background: rgba(255,165,0,0.6);
width: 40px;
height: 40px;
border-radius: 50%;
}

.marker-cluster-large {
background: rgba(255,0,0,0.4);
}

.marker-cluster-large div {
background: rgba(255,0,0,0.6);
width: 50px;
height: 50px;
border-radius: 50%;
}
  
</style>
</head>

<body>

<div class="panel">

<b>Peta Sebaran Usaha</b><br>
Kota Pontianak

<input type="text" id="searchBox" placeholder="Cari nama usaha">

<select id="filterKec">
<option value="">Semua Kecamatan</option>
</select>

<button onclick="toggleHeatmap()">Toggle Heatmap</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

var map = L.map('map').setView([-0.02,109.34],12)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

var markers = L.markerClusterGroup({
chunkedLoading:true,

iconCreateFunction: function(cluster){

return L.divIcon({
html:"<div></div>",
className:"marker-cluster",
iconSize:L.point(40,40)
})

}

})

var pinIcon = L.icon({
iconUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png",
shadowUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
iconSize:[25,41],
iconAnchor:[12,41]
})

var heatLayer
var heatData=[]
var usahaData=[]

function loadData(data){

markers.clearLayers()
heatData=[]

data.forEach(function(u){

if(!u.lat || !u.lon) return

var marker = L.marker([u.lat,u.lon],{icon:pinIcon})

var popup = `
<b>${u.nama}</b><br>
Jenis Usaha: ${u.kegiatan}<br>
Skala: ${u.skala}<br>
Alamat: ${u.alamat}<br>
Kelurahan: ${u.desa}<br>
Kecamatan: ${u.kecamatan}
`

marker.bindPopup(popup)

markers.addLayer(marker)

heatData.push([u.lat,u.lon,0.5])

})

map.addLayer(markers)

heatLayer = L.heatLayer(heatData,{radius:25})

}

function populateKecamatan(data){

var kecSet = new Set()

data.forEach(function(d){

if(d.kecamatan){
kecSet.add(d.kecamatan)
}

})

var select=document.getElementById("filterKec")

kecSet.forEach(function(k){

var opt=document.createElement("option")

opt.value=k
opt.text=k

select.appendChild(opt)

})

}

function filterData(){

var kec=document.getElementById("filterKec").value
var search=document.getElementById("searchBox").value.toLowerCase()

var filtered=usahaData.filter(function(u){

var cocok=true

if(kec && u.kecamatan!=kec)
cocok=false

if(search && !u.nama.toLowerCase().includes(search))
cocok=false

return cocok

})

loadData(filtered)

}

document.getElementById("filterKec")
.addEventListener("change",filterData)

document.getElementById("searchBox")
.addEventListener("keyup",filterData)

function toggleHeatmap(){

if(map.hasLayer(heatLayer))
map.removeLayer(heatLayer)
else
map.addLayer(heatLayer)

}

fetch("DATA_SBR_UPDATED.xlsx")

.then(res=>res.arrayBuffer())

.then(data=>{

var workbook=XLSX.read(data,{type:"array"})

var sheet=workbook.Sheets[workbook.SheetNames[0]]

var json=XLSX.utils.sheet_to_json(sheet)

usahaData=json.map(function(r){

return{

nama:r.nama_usaha,
alamat:r.alamat_usaha,
kegiatan:r.kegiatan_usaha,
skala:r.skala_usaha,
kecamatan:r.nmkec,
desa:r.nmdesa,
lat:parseFloat(r.latitude),
lon:parseFloat(r.longitude)

}

})

populateKecamatan(usahaData)

loadData(usahaData)

})

</script>

</body>
</html>
